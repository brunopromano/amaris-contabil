version: '3.8'

services:
  sqlserverdb:
    image: mcr.microsoft.com/mssql/server:2019-latest
    container_name: sqlserverdb
    environment:
      SA_PASSWORD: "Bruno@123"
      ACCEPT_EULA: "Y"
      MSSQL_PID: "Express"
    ports:
      - "1434:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'Bruno@123' -Q 'SELECT 1' -No || /opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P 'Bruno@123' -Q 'SELECT 1'"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 40s

  webapi:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: amaris-contabil-api
    ports:
      - "5000:80"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__DefaultConnection=Data Source=sqlserverdb;Initial Catalog=AmarisContabil;Trusted_Connection=False;User ID=sa;Password=Bruno@123
    volumes:
      - ./logs:/app/logs
    depends_on:
      sqlserverdb:
        condition: service_healthy

volumes:
  sqlserver_data:
